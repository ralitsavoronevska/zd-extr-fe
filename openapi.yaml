openapi: 3.0.3
info:
  title: Zendesk Ticket Extractor API
  version: 1.0.0
  description: |
    ## Цел
    Това API замества единичния ендпойнт (~100MB, 65 сек. зареждане) с 7 оптимизирани ендпойнта.

    ## Извлечено от фронтенд код
    Спецификацията е извлечена от анализ на фронтенд сорс кода (zd-extr-fe-refactored-master):
    - **TicketService.js** — API извиквания и очаквани отговори
    - **ticketData.js** — data flow и полета
    - **useFacetedFilterOptions.js** — faceted filtering логика
    - **useStatsAggregation.js** — stats агрегация
    - **useVipAggregation.js** — VIP CSAT матрица
    - **useCSVExport.js** — CSV колони и формат
    - **ticketFilters.js** — пълна филтър логика
    - **enums.js** — фиксирани стойности (VIP_TIERS, CSAT_OPTIONS, SENTIMENT_OPTIONS, NEGATIVE_SENTIMENTS)

    ## Конвенции
    - Дати: ISO 8601 (2026-03-01T00:00:00Z)
    - Пагинация: 1-based (page=1 е първата страница)
    - Multi-value филтри: comma-separated (brand=A,B)
    - Текстови филтри: case-insensitive
    - Enum стойности (vip_level, sentiment, csat_score): бекендът връща Title Case (напр. "Platinum", "Very Positive"), фронтендът нормализира в lowercase при получаване
    - ticketid: бекендът връща integer, фронтендът конвертира в string
    - Празни/null стойности: изключени от filter options
    - Всички масиви в filter options: сортирани азбучно

servers:
  - url: http://127.0.0.1:4010
    description: Local development
  - url: https://your-production-url.com
    description: Production (Amazon)

tags:
  - name: Tickets
    description: |
      Paginated ticket list и detail.
      Файлове: TicketService.js, ticketData.js, TableDoc.vue
  - name: Filters
    description: |
      Distinct стойности за dropdown филтри.
      Файл: useFacetedFilterOptions.js
  - name: Analytics
    description: |
      Агрегирани статистики, topic charts, VIP CSAT.
      Файлове: useStatsAggregation.js, tableStore.js, useVipAggregation.js
  - name: Export
    description: |
      Streaming CSV download.
      Файл: useCSVExport.js

paths:
  /api/ticket-conversation-summaries/:
    get:
      tags: [Tickets]
      summary: Paginated ticket list (основен ендпойнт)
      operationId: listTickets
      description: |
        **Източник:** TicketService.js → getTicketSummaries(), редове 14-54

        Основният ендпойнт. Фронтендът го извиква при всяка промяна на страница и филтър.

        **КРИТИЧНО:** Не връща chat_transcript и email_transcript текст!
        Вместо тях връща has_chat_transcript и has_email_transcript (boolean).

        **Целево време:** < 500ms (p95)
        **Макс. payload:** < 100 KB
      parameters:
        - name: page
          in: query
          required: false
          description: Номер на страница (1-based)
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: page_size
          in: query
          required: false
          description: "Резултати на страница. Код: PAGE_SIZE_OPTIONS = [5, 10, 20, 50, 100]"
          schema:
            type: integer
            default: 5
            enum: [5, 10, 20, 50, 100]
        - name: ordering
          in: query
          required: false
          description: |
            Поле за сортиране. Префикс `-` за descending.
            Допустими: timestamp, ticketid, brand, topic, started_at, updated_at
          schema:
            type: string
            default: "-timestamp"
          example: "-timestamp"
        - name: timestamp_gte
          in: query
          required: false
          description: "Тикети с timestamp >= стойността (inclusive). Код: startDate → timestamp_gte"
          schema:
            type: string
            format: date-time
            example: "2026-03-01T00:00:00Z"
        - name: timestamp_lt
          in: query
          required: false
          description: "Тикети с timestamp < стойността (exclusive). Код: endDate → timestamp_lt"
          schema:
            type: string
            format: date-time
            example: "2026-04-01T00:00:00Z"
        - name: started_at_gte
          in: query
          required: false
          description: started_at >= стойността
          schema:
            type: string
            format: date-time
        - name: started_at_lt
          in: query
          required: false
          description: started_at < стойността
          schema:
            type: string
            format: date-time
        - name: updated_at_gte
          in: query
          required: false
          description: updated_at >= стойността
          schema:
            type: string
            format: date-time
        - name: updated_at_lt
          in: query
          required: false
          description: updated_at < стойността
          schema:
            type: string
            format: date-time
        - name: search
          in: query
          required: false
          description: |
            Global search. Код търси едновременно в: ticketid, topic, brand,
            vip_level, customer_email, agent_email, csat_score, sentiment,
            sentiment_reason, summary, chat_transcript, email_transcript, _chatTagsString
            (виж ticketFilters.js ред 61-76)
          schema:
            type: string
            example: "refund request"
        - name: brand
          in: query
          required: false
          description: |
            Multi-value филтър. Код: brand.join(',').
            Логика: ticket.brand IN (values)
          schema:
            type: string
            example: "BrandA,BrandB"
        - name: topic
          in: query
          required: false
          description: |
            Multi-value филтър. Код: topic.join(',').
            Логика: ticket.topic IN (values).
            ВАЖНО: Бекендът трябва да връща чисти topic имена без "|" суфикс.
          schema:
            type: string
            example: "Deposits,KYC / Verification"
        - name: vip_level
          in: query
          required: false
          description: |
            Multi-value филтър. Допустими стойности от enums.js VIP_SEGMENT_ORDER:
            none, normal, bronze, silver, gold, platinum, diamond
          schema:
            type: string
            example: "gold,platinum"
        - name: agent_email
          in: query
          required: false
          description: |
            Multi-value филтър. Код: agent_email.join(',').
            Логика: CONTAINS match (case-insensitive)
          schema:
            type: string
            example: "agent@example.com"
        - name: customer_email
          in: query
          required: false
          description: |
            Multi-value филтър. Код: customer_email.join(',').
            Логика: CONTAINS match (case-insensitive)
          schema:
            type: string
            example: "customer@example.com"
        - name: chat_tags
          in: query
          required: false
          description: |
            Multi-value филтър. Код: _chatTagsString.join(',').
            Логика: тикетът съвпада ако съдържа ПОНЕ ЕДИН от таговете
          schema:
            type: string
            example: "resolved,escalated"
        - name: csat_score
          in: query
          required: false
          description: "Exact match. Стойности от enums.js CSAT_OPTIONS"
          schema:
            type: string
            enum: [good, bad, unoffered, offered]
        - name: sentiment
          in: query
          required: false
          description: "Exact match. Стойности от enums.js SENTIMENT_OPTIONS"
          schema:
            type: string
            enum: [positive, very positive, neutral, negative, very negative]
        - name: sentiment_reason
          in: query
          required: false
          description: CONTAINS match по полето sentiment_reason
          schema:
            type: string
        - name: summary_contains
          in: query
          required: false
          description: CONTAINS match по полето summary
          schema:
            type: boolean
        - name: chat_transcript_contains
          in: query
          required: false
          description: CONTAINS match по полето chat_transcript
          schema:
            type: boolean
        - name: email_transcript_contains
          in: query
          required: false
          description: CONTAINS match по полето email_transcript
          schema:
            type: boolean
        - name: ticketid
          in: query
          required: false
          description: Exact match по ticketid
          schema:
            type: integer
            example: 2102887
      responses:
        "200":
          description: |
            Paginated ticket list.
            Код очаква: response.data.results и response.data.count
            (TicketService.js ред 52-53)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedTicketList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/ticket-summaries/{ticketid}/:
    get:
      tags: [Tickets]
      summary: Ticket detail с транскрипции
      operationId: getTicketDetail
      description: |
        **Източник:** TicketService.js → getTicketById() (ред 57-62)

        В момента връща null за API mode — трябва да се имплементира.
        Връща ПЪЛНИЯ обект ВКЛЮЧИТЕЛНО chat_transcript и email_transcript.
        Фронтендът извиква при натискане на "View" бутон.

        **Целево време:** < 200ms (p95)
        **Макс. payload:** < 50 KB
      parameters:
        - name: ticketid
          in: path
          required: true
          description: Уникален ID на тикета
          schema:
            type: integer
            example: 2102887
      responses:
        "200":
          description: Пълен тикет с транскрипции
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketDetail"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/ticket-filter-options/:
    get:
      tags: [Filters]
      summary: Distinct стойности за dropdown филтри
      operationId: getFilterOptions
      description: |
        **Източник:** useFacetedFilterOptions.js (цял файл, 130 реда)

        В момента фронтендът изчислява distinct values client-side с bitmask алгоритъм.
        Този ендпойнт трябва да възпроизведе СЪЩАТА логика server-side.

        **Faceted filtering логика:**
        За всяко multiselect поле, прилагай ВСИЧКИ активни филтри ОСВЕН
        филтъра на самото поле. Когато потребителят избере brand=BrandA,
        върнатите topic стойности включват САМО topics от тикети на BrandA.

        **Всички масиви сортирани азбучно** (useFacetedFilterOptions.js ред 108)

        **Целево време:** < 300ms (p95)
        **Макс. payload:** < 20 KB
      parameters:
        - name: timestamp_gte
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: timestamp_lt
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: brand
          in: query
          required: false
          description: Comma-separated. За faceted filtering.
          schema:
            type: array
        - name: topic
          in: query
          required: false
          description: Comma-separated
          schema:
            type: array
        - name: vip_level
          in: query
          required: false
          description: Comma-separated
          schema:
            type: array
        - name: agent_email
          in: query
          required: false
          description: Comma-separated
          schema:
            type: array
        - name: customer_email
          in: query
          required: false
          description: Comma-separated
          schema:
            type: array
        - name: chat_tags
          in: query
          required: false
          description: Comma-separated
          schema:
            type: array
        - name: csat_score
          in: query
          required: false
          schema:
            type: array
            enum: good, bad, unoffered, offered
        - name: sentiment
          in: query
          required: false
          schema:
            type: array
            enum: positive, very positive, neutral, negative, very negative
      responses:
        "200":
          description: Distinct values за всеки dropdown. Всички масиви сортирани азбучно.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilterOptions"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/ticket-stats/:
    get:
      tags: [Analytics]
      summary: Агрегирани статистики за dashboard
      operationId: getTicketStats
      description: |
        **Източник:** useStatsAggregation.js (цял файл, 85 реда)

        В момента фронтендът изчислява client-side. Бекендът трябва да
        възпроизведе СЪЩАТА логика server-side.

        **Compliance логика** (useStatsAggregation.js ред 6-8):
        - ok = summary matches /compliance[:\s]+ok/i
        - issue = summary matches /compliance[:\s]+issue/i
        - missing = summary НЕ съдържа думата "compliance"

        **VIP логика** (useStatsAggregation.js ред 38-41):
        - vipPlatinum = platinum + diamond заедно
        - vipGold = gold
        - vipOther = bronze + silver

        Приема СЪЩИТЕ филтри като list endpoint.

        **Целево време:** < 500ms (p95)
        **Макс. payload:** < 5 KB
      parameters:
        - name: timestamp_gte
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: timestamp_lt
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: brand
          in: query
          required: false
          schema:
            type: string
        - name: topic
          in: query
          required: false
          schema:
            type: string
        - name: vip_level
          in: query
          required: false
          schema:
            type: string
        - name: agent_email
          in: query
          required: false
          schema:
            type: string
        - name: customer_email
          in: query
          required: false
          schema:
            type: string
        - name: chat_tags
          in: query
          required: false
          schema:
            type: string
        - name: csat_score
          in: query
          required: false
          schema:
            type: string
            enum: [good, bad, unoffered, offered]
        - name: sentiment
          in: query
          required: false
          schema:
            type: string
            enum: [positive, very positive, neutral, negative, very negative]
      responses:
        "200":
          description: Агрегирани статистики
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketStats"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/topic-chart-data/:
    get:
      tags: [Analytics]
      summary: Topic статистики за графики
      operationId: getTopicChartData
      description: |
        **Източник:** tableStore.js → topicStats computed (ред 18-39) + useChartAggregations.js

        **Negative логика** (от enums.js NEGATIVE_SENTIMENTS):
        sentiment IN ['negative', 'very negative']

        Сортирано по total descending. Макс 100 топика.
        Приема СЪЩИТЕ филтри като list endpoint.

        **Целево време:** < 500ms (p95)
        **Макс. payload:** < 10 KB
      parameters:
        - name: timestamp_gte
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: timestamp_lt
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: brand
          in: query
          required: false
          schema:
            type: string
        - name: topic
          in: query
          required: false
          schema:
            type: string
        - name: vip_level
          in: query
          required: false
          schema:
            type: string
        - name: csat_score
          in: query
          required: false
          schema:
            type: array
            enum: good, bad, unoffered, offered
        - name: sentiment
          in: query
          required: false
          schema:
            type: array
            enum: positive, very positive, neutral, negative, very negative
      responses:
        "200":
          description: Topic chart data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopicChartData"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/vip-csat-data/:
    get:
      tags: [Analytics]
      summary: VIP segment x date CSAT матрица
      operationId: getVipCsatData
      description: |
        **Източник:** useVipAggregation.js (цял файл, 120 реда)

        **Сегментен ред** (от enums.js VIP_SEGMENT_ORDER):
        none, normal, bronze, silver, gold, platinum, diamond

        **CSAT логика** (useVipAggregation.js ред 60-63):
        - good = csat_score === 'good'
        - bad = csat_score === 'bad'
        - rated = good + bad (unoffered изключени)

        **Дати:** генерирани от min(timestamp) до max(timestamp) по дни
        Приема СЪЩИТЕ филтри като list endpoint.

        **Целево време:** < 500ms (p95)
        **Макс. payload:** < 20 KB
      parameters:
        - name: timestamp_gte
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: timestamp_lt
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: vip_level
          in: query
          required: false
          schema:
            type: array
        - name: csat_score
          in: query
          required: false
          schema:
            type: string
            enum: [good, bad, unoffered, offered]
      responses:
        "200":
          description: VIP CSAT grid data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VipCsatData"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/ticket-summaries/export/:
    get:
      tags: [Export]
      summary: Streaming CSV export
      operationId: exportTicketsCsv
      description: |
        **Източник:** useCSVExport.js (цял файл, 95 реда)

        В момента фронтендът генерира CSV client-side от filteredRows.

        **CSV колони** (от useCSVExport.js ред 60-73, ТОЧЕН ред):
        Date, Topic, Ticket ID, Brand, VIP Level, Customer Email, Agent Email,
        CSAT Score, Chat Tags, Chat Transcript, Email Transcript, Sentiment,
        Sentiment Reason, Summary

        **ВАЖНО:** CSV ВКЛЮЧВА пълните chat_transcript и email_transcript
        (за разлика от list endpoint).
        Игнорира page/page_size — експортира ВСИЧКО.

        **Целево време:** First byte < 1s
        **Payload:** Streaming, без лимит
      parameters:
        - name: timestamp_gte
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: timestamp_lt
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: brand
          in: query
          required: false
          schema:
            type: string
        - name: topic
          in: query
          required: false
          schema:
            type: string
        - name: vip_level
          in: query
          required: false
          schema:
            type: string
        - name: csat_score
          in: query
          required: false
          schema:
            type: string
            enum: [good, bad, unoffered, offered]
        - name: sentiment
          in: query
          required: false
          schema:
            type: string
            enum: [positive, very positive, neutral, negative, very negative]
      responses:
        "200":
          description: Streaming CSV файл
          headers:
            Content-Disposition:
              schema:
                type: string
                example: 'attachment; filename="tickets-2026-03-31.csv"'
          content:
            text/csv:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  schemas:
    TicketSummary:
      type: object
      description: |
        Тикет в list response. Полета от ticketData.js → processTicket() и TableDoc.vue.
        ВАЖНО: НЕ съдържа chat_transcript и email_transcript текст!
      required:
        - ticketid
        - timestamp
        - brand
        - topic
        - vip_level
        - csat_score
        - sentiment
        - has_chat_transcript
        - has_email_transcript
      properties:
        ticketid:
          type: integer
          description: Уникален идентификатор. Frontend конвертира в string.
          example: 2102887
        timestamp:
          type: string
          format: date-time
          description: Дата на създаване. Код конвертира в Date обект.
          example: "2026-03-31T14:30:00Z"
        started_at:
          type: string
          format: date-time
          nullable: true
          description: Начало на чат/имейл
          example: "2026-03-31T14:00:00Z"
        updated_at:
          type: string
          format: date-time
          nullable: true
          description: Последна актуализация
          example: "2026-03-31T15:00:00Z"
        brand:
          type: string
          description: Код прилага emptyToNone() нормализация
          example: "BrandX"
        topic:
          type: string
          description: |
            ВАЖНО: Бекендът ТРЯБВА да връща чисто име без "|" суфикс.
            Код strip-ва текста след "|" в ticketData.js ред 24-27.
            Една от 15 фиксирани категории (виж секция Topic Values).
          example: "Deposits"
        vip_level:
          type: string
          # COMMENT: Бекендът връща Title Case (напр. "Platinum", "Gold"). 
          # Контрактът дефинира lowercase. Фронтендът нормализира в lowercase, 
          # но бекендът трябва да реши кое е каноничното — или да връща lowercase директно, 
          # или да приема и двата варианта при филтриране.
          description: От enums.js VIP_SEGMENT_ORDER. Може да е празен string — фронтендът конвертира в "none".
          enum: [none, normal, bronze, silver, gold, platinum, diamond]
          example: "gold"
        customer_email:
          type: string
          format: email
          example: "customer@example.com"
        agent_email:
          type: string
          format: email
          example: "agent@example.com"
        csat_score:
          type: string
          # COMMENT: Бекендът връща lowercase (коректно). 
          # Ако се промени на Title Case — фронтендът вече нормализира.
          description: От enums.js CSAT_OPTIONS
          enum: [good, bad, unoffered, offered]
          example: "good"
        sentiment:
          type: string
          # COMMENT: Бекендът връща Title Case (напр. "Neutral", "Very Positive"). 
          # Контрактът дефинира lowercase. Фронтендът нормализира в lowercase, 
          # но бекендът трябва да реши кое е каноничното — или да връща lowercase директно, 
          # или да приема и двата варианта при филтриране.
          description: От enums.js SENTIMENT_OPTIONS
          enum: [positive, very positive, neutral, negative, very negative]
          example: "positive"
        sentiment_reason:
          type: string
          description: Кратко обяснение за sentiment оценката
          example: "Quick resolution of deposit query"
        summary:
          type: string
          description: Кратко резюме. Използва се и за compliance regex в useStatsAggregation.js
          example: "Customer asked about deposit timing..."
        chat_tags:
          type: array
          items:
            type: string
          description: Масив от стрингове. Код join-ва в _chatTagsString за филтриране.
          example: ["resolved", "deposit"]
        has_chat_transcript:
          type: boolean
          description: "true ако chat_transcript е non-empty. НЕ връща самия текст!"
          example: true
        has_email_transcript:
          type: boolean
          description: "true ако email_transcript е non-empty. НЕ връща самия текст!"
          example: false

    TicketDetail:
      description: |
        Пълен тикет — всички полета от TicketSummary ПЛЮС транскрипции.
        Извиква се при натискане на "View" бутон в таблицата.
      allOf:
        - $ref: "#/components/schemas/TicketSummary"
        - type: object
          properties:
            chat_transcript:
              type: string
              nullable: true
              description: Пълен текст на чат транскрипцията
              example: "Customer: I want a refund...\nAgent: Let me check..."
            email_transcript:
              type: string
              nullable: true
              description: Пълен текст на имейл транскрипцията
              example: null

    PaginatedTicketList:
      type: object
      description: |
        Пагиниран отговор. Код чете response.data.count и response.data.results.
        count е задължителен — пагинаторът показва "Showing 1 to 5 of 1,523".
      required: [count, results]
      properties:
        count:
          type: integer
          description: Общ брой тикети (за пагинатора)
          example: 1523
        next:
          type: string
          nullable: true
          description: URL на следващата страница
          example: "http://host/api/ticket-summaries/?page=2&page_size=5"
        previous:
          type: string
          nullable: true
          description: URL на предишната страница
          example: null
        results:
          type: array
          items:
            $ref: "#/components/schemas/TicketSummary"

    FilterOptions:
      type: object
      description: |
        Distinct стойности за dropdowns. Всички масиви сортирани азбучно.
        Празни/null стойности изключени.
        Източник: useFacetedFilterOptions.js ред 108 sortFn
      properties:
        topic:
          type: array
          items:
            type: string
          example: ["Account Closure", "Account Issue", "Bonus Issue", "Bonus Question", "Deposit Fees", "Deposits", "Free Bonus Request", "Game Issue", "KYC / Verification", "Legal Threat", "Responsible Gaming / Addiction", "Suicide Threat", "Technical Issue", "VIP / Loyalty", "Withdrawals (WD)"]
        brand:
          type: array
          items:
            type: string
          example: ["BrandA", "BrandB", "BrandC", "BrandX"]
        vip_level:
          type: array
          items:
            type: string
          example: ["bronze", "diamond", "gold", "none", "normal", "platinum", "silver"]
        customer_email:
          type: array
          items:
            type: string
          example: ["cust1@example.com", "cust2@example.com"]
        agent_email:
          type: array
          items:
            type: string
          example: ["agent1@example.com", "agent2@example.com"]
        chat_tags:
          type: array
          items:
            type: string
          example: ["billing", "deposit", "escalated", "resolved", "withdrawal"]
        sentiment:
          type: array
          items:
            type: string
          example: ["negative", "neutral", "positive", "very negative", "very positive"]
        csat_score:
          type: array
          items:
            type: string
          example: ["bad", "good", "unoffered"]

    TicketStats:
      type: object
      description: |
        Агрегирани статистики. Логика от useStatsAggregation.js.
        Compliance е regex-based върху summary полето.
      properties:
        total_tickets:
          type: integer
          example: 1523
        csat:
          type: object
          properties:
            good:
              type: integer
              example: 890
            bad:
              type: integer
              example: 120
            unoffered:
              type: integer
              example: 513
        sentiment:
          type: object
          properties:
            positive:
              type: integer
              example: 600
            very_positive:
              type: integer
              example: 200
            neutral:
              type: integer
              example: 605
            negative:
              type: integer
              example: 95
            very_negative:
              type: integer
              example: 23
        brands_count:
          type: integer
          description: Брой уникални brand-ове (без 'none')
          example: 5
        vip:
          type: object
          description: |
            Брой тикети по VIP ниво.
            Код групира: platinum+diamond заедно, gold отделно, bronze+silver заедно
          properties:
            platinum:
              type: integer
              example: 45
            diamond:
              type: integer
              example: 12
            gold:
              type: integer
              example: 89
            silver:
              type: integer
              example: 120
            bronze:
              type: integer
              example: 200
        compliance:
          type: object
          description: |
            Regex-based от useStatsAggregation.js:
            ok = /compliance[:\s]+ok/i
            issue = /compliance[:\s]+issue/i
            missing = не съдържа "compliance"
          properties:
            ok:
              type: integer
              example: 1200
            issue:
              type: integer
              example: 50
            missing:
              type: integer
              example: 273
        unrated_tickets:
          type: integer
          description: Равно на csat.unoffered
          example: 513

    TopicChartData:
      type: object
      description: |
        Topic статистики за графики.
        Логика от tableStore.js → topicStats computed.
        Сортирано по total descending. Макс 100.
      properties:
        topics:
          type: array
          items:
            type: object
            required: [topic, total, negative, percent_negative]
            properties:
              topic:
                type: string
                example: "Deposits"
              total:
                type: integer
                description: Общ брой тикети за този топик
                example: 342
              negative:
                type: integer
                description: "Тикети с sentiment IN ['negative', 'very negative']"
                example: 28
              percent_negative:
                type: number
                format: float
                description: (negative / total) * 100
                example: 8.19

    VipCsatData:
      type: object
      description: |
        VIP CSAT матрица. Логика от useVipAggregation.js.
        Сегментен ред от enums.js VIP_SEGMENT_ORDER.
      properties:
        segments:
          type: array
          items:
            type: string
          description: "Фиксиран ред: none, normal, bronze, silver, gold, platinum, diamond"
          example: ["none", "normal", "bronze", "silver", "gold", "platinum", "diamond"]
        dates:
          type: array
          items:
            type: string
            format: date
          description: Дати в YYYY-MM-DD формат, от min до max timestamp
          example: ["2026-03-29", "2026-03-30", "2026-03-31"]
        data:
          type: object
          description: "Ключ = segment, стойност = обект с ключ дата → {good, bad, rated}"
          example:
            none: {}
            normal: {}
            bronze:
              "2026-03-30": {good: 3, bad: 1, rated: 4}
            silver: {}
            gold:
              "2026-03-30": {good: 8, bad: 1, rated: 9}
              "2026-03-31": {good: 12, bad: 3, rated: 15}
            platinum:
              "2026-03-31": {good: 4, bad: 0, rated: 4}
            diamond: {}
        totals:
          type: object
          description: Агрегация по дата за всички сегменти
          example:
            "2026-03-29": {good: 0, bad: 0, rated: 0}
            "2026-03-30": {good: 11, bad: 2, rated: 13}
            "2026-03-31": {good: 16, bad: 3, rated: 19}

    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
          example: "Invalid value for csat_score: xyz"

  responses:
    BadRequest:
      description: 400 — Невалиден параметър или стойност
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            detail: "Invalid value for csat_score: xyz"
    Unauthorized:
      description: |
        401 — Липсва или невалидна автентикация.
        Код: authApi.js прихваща 401 и прави auto-refresh на JWT token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            detail: "Authentication credentials were not provided."
    NotFound:
      description: 404 — Тикетът не е намерен
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            detail: "Not found."
